services:
  llama:
    build:
      context: .
      args:
        LLAMA_CPP_VERSION: ${LLAMA_CPP_VERSION:-b9993}
    image: llama-amd-api:${LLAMA_CPP_VERSION:-b9993}
    restart: unless-stopped
    # AMD iGPU for the Vulkan/RADV backend. Comment out on hosts without a GPU
    # (llama.cpp falls back to CPU automatically).
    devices:
      - /dev/dri:/dev/dri
    environment:
      LLAMA_ARG_HF_REPO: ${LLAMA_ARG_HF_REPO:-ggml-org/gemma-3-4b-it-GGUF:Q4_K_M}
      LLAMA_ARG_PORT: ${LLAMA_ARG_PORT:-8080}
      LLAMA_ARG_CTX_SIZE: ${LLAMA_ARG_CTX_SIZE:-8192}
      LLAMA_ARG_N_GPU_LAYERS: ${LLAMA_ARG_N_GPU_LAYERS:-999}
      HF_TOKEN: ${HF_TOKEN:-}
      LLAMA_EXTRA_ARGS: ${LLAMA_EXTRA_ARGS:-}
    ports:
      - "${LLAMA_ARG_PORT:-8080}:${LLAMA_ARG_PORT:-8080}"
    volumes:
      - llama-build:/opt/llama.cpp/build
      - llama-models:/models

volumes:
  llama-build:
  llama-models:
